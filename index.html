
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Advanced 4K Lyric Subtitle Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0b0b14;color:white;font-family:Arial;height:100vh;display:flex;flex-direction:column}
#top{background:#141428;padding:10px;display:flex;gap:10px;flex-wrap:wrap}
button{background:#e94560;border:none;color:white;padding:6px 12px;border-radius:4px;cursor:pointer}
input,select{background:#111;color:white;border:1px solid #333;padding:4px}
textarea{width:100%;height:120px;background:#111;color:white;border:1px solid #333;padding:8px}
#stage{flex:1;background:black;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
video{max-width:100%;max-height:100%}
#subtitle{position:absolute;text-align:center;font-family:'Anton',sans-serif;font-size:4vw;color:white;-webkit-text-stroke:4px black;cursor:move}
canvas{display:none}
#seek{width:300px}
</style>
</head>

<body>

<div id="top">
<input type="file" id="videoFile" accept="video/*">
<button onclick="parseLyrics()">Load Lyrics</button>
<button onclick="tap()">Tap</button>
<button onclick="preview()">Preview</button>
<button onclick="exportVideo()">Export</button>

<select id="mode">
<option value="word">Word</option>
<option value="char">Char</option>
</select>

<label>Start</label>
<input id="startTime" value="0">

<label>End</label>
<input id="endTime" placeholder="auto">

<input type="range" id="seek" min="0" max="100" value="0">
</div>

<textarea id="lyrics" placeholder="Blank line = new cue"></textarea>

<div id="stage">
<video id="video"></video>
<div id="subtitle"></div>
</div>

<canvas id="videoCanvas"></canvas>
<canvas id="subCanvas"></canvas>

<script>

let cues=[]
let tapIndex=0
let dragging=false
let offsetX=0
let offsetY=0

const video=document.getElementById("video")
const subtitle=document.getElementById("subtitle")
const seek=document.getElementById("seek")

document.getElementById("videoFile").onchange=e=>{
video.src=URL.createObjectURL(e.target.files[0])
video.onloadedmetadata=()=>{
seek.max=video.duration
}
}

function parseLyrics(){

cues=[]
tapIndex=0

const blocks=document.getElementById("lyrics").value.split(/\\n\\n+/)

blocks.forEach(b=>{

const lines=b.split(/\\n/).filter(Boolean)

cues.push({
lines:lines,
start:null,
speed:350
})

})

}

function tap(){

if(!cues.length) return

if(tapIndex>=cues.length) return

cues[tapIndex].start=video.currentTime

tapIndex++

}

seek.oninput=e=>{

video.currentTime=e.target.value

}

video.ontimeupdate=()=>{

seek.value=video.currentTime

}

function preview(){

video.currentTime=0
video.play()

requestAnimationFrame(loop)

}

function loop(){

const t=video.currentTime

let active=-1

for(let i=0;i<cues.length;i++){

if(cues[i].start!==null && t>=cues[i].start) active=i

}

if(active>=0){

subtitle.innerHTML=cues[active].lines.join("<br>")

}

if(!video.paused) requestAnimationFrame(loop)

}

subtitle.onmousedown=e=>{

dragging=true
offsetX=e.offsetX
offsetY=e.offsetY

}

document.onmousemove=e=>{

if(!dragging) return

subtitle.style.left=(e.pageX-offsetX)+"px"
subtitle.style.top=(e.pageY-offsetY)+"px"

}

document.onmouseup=()=>dragging=false

async function exportVideo(){

const start=parseFloat(document.getElementById("startTime").value)||0
const end=parseFloat(document.getElementById("endTime").value)||video.duration

const vCanvas=document.getElementById("videoCanvas")
const sCanvas=document.getElementById("subCanvas")

const W=video.videoWidth
const H=video.videoHeight

vCanvas.width=W
vCanvas.height=H

const SS=3

sCanvas.width=W*SS
sCanvas.height=H*SS

const vctx=vCanvas.getContext("2d")
const sctx=sCanvas.getContext("2d")

const stream=vCanvas.captureStream(30)

const recorder=new MediaRecorder(stream,{mimeType:"video/webm"})

const chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=()=>{

const blob=new Blob(chunks,{type:"video/webm"})

const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="exported_subtitle_video.webm"
a.click()

}

recorder.start()

video.currentTime=start
video.play()

function render(){

if(video.currentTime>=end || video.paused || video.ended){

recorder.stop()
return

}

vctx.drawImage(video,0,0,W,H)

sctx.clearRect(0,0,sCanvas.width,sCanvas.height)

sctx.setTransform(SS,0,0,SS,0,0)

sctx.font="900 "+(W*0.06)+"px Anton"
sctx.textAlign="center"
sctx.lineWidth=20
sctx.strokeStyle="black"
sctx.fillStyle="white"

const lines=subtitle.innerText.split("\\n")

lines.forEach((l,i)=>{

const y=H*0.85+i*60

sctx.strokeText(l,W/2,y)
sctx.fillText(l,W/2,y)

})

vctx.drawImage(sCanvas,0,0,W,H)

requestAnimationFrame(render)

}

render()

}

</script>

</body>
</html>
