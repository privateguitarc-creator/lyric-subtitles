<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Subtitle Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; overflow-x: hidden; }

  #editor { padding: 10px 16px; background: #16213e; border-bottom: 2px solid #0f3460; }
  #editor h1 { font-size: 1rem; color: #e94560; margin-bottom: 8px; letter-spacing: 1px; }
  label { font-size: 0.68rem; color: #aaa; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
  textarea { width: 100%; height: 72px; background: #0f3460; border: 1px solid #e94560; border-radius: 5px; color: #fff; padding: 7px 10px; font-size: 0.85rem; resize: vertical; outline: none; margin-bottom: 8px; }
  textarea::placeholder { color: #555; }
  .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; margin-bottom: 8px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 3px; }
  .slider-row { display: flex; align-items: center; gap: 6px; }
  input[type=range] { flex: 1; accent-color: #e94560; }
  .val-label { font-size: 0.76rem; color: #e94560; font-weight: 700; min-width: 54px; text-align: right; }
  select { background: #0f3460; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px 8px; font-size: 0.82rem; outline: none; cursor: pointer; width: 100%; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  button { background: #e94560; color: #fff; border: none; border-radius: 5px; padding: 7px 14px; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.15s; user-select: none; }
  button:hover { background: #c73652; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.sec { background: #0f3460; border: 1px solid #e94560; }
  button.sec:hover:not(:disabled) { background: #1a4a80; }

  /* play/pause toggle */
  #playpause-btn { min-width: 90px; }
  #playpause-btn.is-playing { background: #c0392b; }
  #playpause-btn.is-playing:hover { background: #a93226; }

  /* record */
  #record-btn { background: #1a7a4a; border: 1px solid #2ecc71; }
  #record-btn.recording { background: #c0392b; border-color: #e74c3c; animation: pulse 1s infinite; }
  #record-btn:hover:not(:disabled):not(.recording) { background: #145e38; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 6px 2px rgba(231,76,60,0.4)} 50%{box-shadow:0 0 14px 6px rgba(231,76,60,0.8)} }

  #rec-timer { font-size: 0.78rem; color: #e74c3c; font-weight: 700; margin-left: 2px; display: none; }
  #rec-timer.active { display: inline; }
  #cue-info { font-size: 0.78rem; color: #888; margin-left: 4px; }
  #progress-bar-wrap { background: #000; height: 3px; }
  #progress-bar { height: 100%; background: #e94560; width: 0%; transition: width 0.1s linear; }
  #hint { font-size: 0.7rem; color: #555; margin-left: 6px; }

  canvas#rec-canvas { display: none; }

  /* STAGE */
  #stage {
    background: #00FF00;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  #subtitle-block { text-align: center; width: 92%; padding: 0; }
  .cue-block { display: none; line-height: 1.25; }
  .sub-line { display: block; }

  .char {
    display: inline;
    font-family: 'Arial Black','Arial',sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000,0 3px 8px rgba(0,0,0,0.9);
    transition: color 0.05s ease;
    cursor: pointer;
  }
  .char:hover { opacity: 0.85; }
  .char.highlighted { color: #FFE600; }
  .char.space { display: inline; cursor: default; }
</style>
</head>
<body>

<canvas id="rec-canvas"></canvas>

<div id="editor">
  <h1>🎵 Lyric Subtitle Tool</h1>
  <label>Paste Lyrics</label>
  <textarea id="lyrics-input" placeholder="AAKE RAAS RACHA JAA&#10;AAKE RAAS RACHA JAA&#10;MURLIWALE BANSIWALE&#10;AAKE RAAS RACHA JAA"></textarea>
  <div class="controls-grid">
    <div class="ctrl-group">
      <label>Highlight Mode</label>
      <select id="mode">
        <option value="word">Word by Word</option>
        <option value="char">Character by Character</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Word Speed</label>
      <div class="slider-row">
        <input type="range" id="word-speed" min="80" max="1500" value="380" step="20">
        <span class="val-label" id="word-speed-val">380 ms</span>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Char Speed</label>
      <div class="slider-row">
        <input type="range" id="char-speed" min="20" max="1500" value="120" step="10">
        <span class="val-label" id="char-speed-val">120 ms</span>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Cue Pause</label>
      <div class="slider-row">
        <input type="range" id="cue-pause" min="0" max="4000" value="1200" step="100">
        <span class="val-label" id="cue-pause-val">1200 ms</span>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Font Size</label>
      <div class="slider-row">
        <input type="range" id="font-size" min="2" max="10" value="5.5" step="0.25">
        <span class="val-label" id="font-size-val">5.5 vw</span>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Lines per Cue</label>
      <select id="lines-per-cue">
        <option value="1">1 line</option>
        <option value="2" selected>2 lines</option>
        <option value="3">3 lines</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button id="load-btn">⬆ Load</button>
    <button id="playpause-btn" disabled>▶ Play</button>
    <button class="sec" id="reset-btn" disabled>⏹ Reset</button>
    <button class="sec" id="prev-btn" disabled>◀ Prev</button>
    <button class="sec" id="next-btn" disabled>Next ▶</button>
    <button id="record-btn" disabled>⏺ Record</button>
    <span id="rec-timer">00:00</span>
    <span id="cue-info">Load lyrics to begin</span>
    <span id="hint">💡 Click any letter to start from there · Space = play/pause</span>
  </div>
</div>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="stage">
  <div id="subtitle-block">
    <span class="char" style="font-size:4vw;color:#009900;cursor:default;">PASTE LYRICS &amp; CLICK LOAD</span>
  </div>
</div>

<script>
// ── Stage height ──
function setStageHeight() {
  const edH = document.getElementById('editor').offsetHeight +
              document.getElementById('progress-bar-wrap').offsetHeight;
  document.getElementById('stage').style.height = (window.innerHeight - edH) + 'px';
}
window.addEventListener('resize', setStageHeight);
setStageHeight();

// ── DOM refs ──
const lyricsInput   = document.getElementById('lyrics-input');
const modeEl        = document.getElementById('mode');
const wordSpeedEl   = document.getElementById('word-speed');
const wordSpeedVal  = document.getElementById('word-speed-val');
const charSpeedEl   = document.getElementById('char-speed');
const charSpeedVal  = document.getElementById('char-speed-val');
const cuePauseEl    = document.getElementById('cue-pause');
const cuePauseVal   = document.getElementById('cue-pause-val');
const fontSizeEl    = document.getElementById('font-size');
const fontSizeVal   = document.getElementById('font-size-val');
const linesPerCue   = document.getElementById('lines-per-cue');
const loadBtn       = document.getElementById('load-btn');
const playpauseBtn  = document.getElementById('playpause-btn');
const resetBtn      = document.getElementById('reset-btn');
const prevBtn       = document.getElementById('prev-btn');
const nextBtn       = document.getElementById('next-btn');
const recordBtn     = document.getElementById('record-btn');
const recTimer      = document.getElementById('rec-timer');
const cueInfo       = document.getElementById('cue-info');
const block         = document.getElementById('subtitle-block');
const progressBar   = document.getElementById('progress-bar');
const stage         = document.getElementById('stage');
const recCanvas     = document.getElementById('rec-canvas');

// ── State ──
let cues = [], allUnits = [], unitIndex = 0, currentCue = 0;
let playing = false, timer = null;
let mediaRecorder = null, recordedChunks = [], isRecording = false;
let recStartTime = 0, recTimerInterval = null, rafId = null;

// ── Sliders ──
wordSpeedEl.addEventListener('input', () => wordSpeedVal.textContent = wordSpeedEl.value + ' ms');
charSpeedEl.addEventListener('input', () => charSpeedVal.textContent = charSpeedEl.value + ' ms');
cuePauseEl.addEventListener('input',  () => cuePauseVal.textContent  = cuePauseEl.value  + ' ms');
fontSizeEl.addEventListener('input',  () => {
  fontSizeVal.textContent = fontSizeEl.value + ' vw';
  document.querySelectorAll('.char').forEach(c => c.style.fontSize = fontSizeEl.value + 'vw');
});

// ── LOAD ──
loadBtn.addEventListener('click', () => {
  const raw = lyricsInput.value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const n = parseInt(linesPerCue.value);
  cues = [];
  for (let i = 0; i < lines.length; i += n) cues.push(lines.slice(i, i + n));
  buildDOM();
  resetState();
  [playpauseBtn, resetBtn, prevBtn, nextBtn, recordBtn].forEach(b => b.disabled = false);
  updateNav();
  setStageHeight();
});

// ── BUILD DOM ──
function buildDOM() {
  block.innerHTML = '';
  allUnits = [];
  const fs = fontSizeEl.value + 'vw';
  const mode = modeEl.value;

  cues.forEach((lines, cIdx) => {
    const cueDiv = document.createElement('div');
    cueDiv.className = 'cue-block';

    lines.forEach((line, lIdx) => {
      const lineSpan = document.createElement('span');
      lineSpan.className = 'sub-line';

      if (mode === 'word') {
        line.split(/\s+/).forEach((word, wi) => {
          if (wi > 0) {
            const sp = document.createElement('span');
            sp.className = 'char space'; sp.textContent = ' '; sp.style.fontSize = fs;
            lineSpan.appendChild(sp);
          }
          const span = document.createElement('span');
          span.className = 'char'; span.textContent = word; span.style.fontSize = fs;
          lineSpan.appendChild(span);
          const unitIdx = allUnits.length;
          allUnits.push({ el: span, cueIdx: cIdx, unitIdx });
          // click to jump here
          span.addEventListener('click', () => clickJumpTo(unitIdx));
        });
      } else {
        for (let ci = 0; ci < line.length; ci++) {
          const ch = line[ci];
          const span = document.createElement('span');
          span.className = ch === ' ' ? 'char space' : 'char';
          span.textContent = ch; span.style.fontSize = fs;
          lineSpan.appendChild(span);
          if (ch !== ' ') {
            const unitIdx = allUnits.length;
            allUnits.push({ el: span, cueIdx: cIdx, unitIdx });
            span.addEventListener('click', () => clickJumpTo(unitIdx));
          }
        }
      }

      cueDiv.appendChild(lineSpan);
      if (lIdx < lines.length - 1) cueDiv.appendChild(document.createElement('br'));
    });

    block.appendChild(cueDiv);
  });

  showCue(0);
}

// ── Click on a character/word — jump there & toggle play ──
function clickJumpTo(idx) {
  clearTimeout(timer);
  // clear highlights up to this point, keep already-highlighted ones before
  document.querySelectorAll('.char').forEach(c => c.classList.remove('highlighted'));
  // highlight everything before idx
  for (let i = 0; i < idx; i++) allUnits[i].el.classList.add('highlighted');

  unitIndex = idx;
  const targetCue = allUnits[idx].cueIdx;
  showCue(targetCue);
  updateNav();
  updateProgress();

  // toggle play
  if (playing) {
    // was playing — pause here
    playing = false;
    updatePlayBtn();
  } else {
    // start playing from here
    playing = true;
    updatePlayBtn();
    tick();
  }
}

function showCue(idx) {
  document.querySelectorAll('.cue-block').forEach((el, i) => el.style.display = i === idx ? 'block' : 'none');
  currentCue = idx;
}

function resetState() {
  playing = false; clearTimeout(timer); unitIndex = 0;
  document.querySelectorAll('.char').forEach(c => c.classList.remove('highlighted'));
  if (cues.length) showCue(0);
  updatePlayBtn();
  updateProgress();
}

function getSpeed() { return modeEl.value === 'char' ? parseInt(charSpeedEl.value) : parseInt(wordSpeedEl.value); }

// ── PLAY/PAUSE toggle ──
playpauseBtn.addEventListener('click', () => togglePlay());

function togglePlay() {
  if (!cues.length) return;
  if (playing) {
    playing = false;
    clearTimeout(timer);
  } else {
    playing = true;
    tick();
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  if (playing) {
    playpauseBtn.textContent = '⏸ Pause';
    playpauseBtn.classList.add('is-playing');
  } else {
    playpauseBtn.textContent = '▶ Play';
    playpauseBtn.classList.remove('is-playing');
  }
}

function tick() {
  if (!playing) return;
  if (unitIndex >= allUnits.length) {
    playing = false; updatePlayBtn(); updateProgress(); return;
  }

  const entry = allUnits[unitIndex];

  if (entry.cueIdx !== currentCue) {
    playing = false;
    timer = setTimeout(() => {
      document.querySelectorAll('.char').forEach(c => c.classList.remove('highlighted'));
      showCue(entry.cueIdx); updateNav();
      playing = true; updatePlayBtn(); tick();
    }, parseInt(cuePauseEl.value));
    return;
  }

  entry.el.classList.add('highlighted');
  unitIndex++; updateProgress();
  timer = setTimeout(tick, getSpeed());
}

// ── RESET ──
resetBtn.addEventListener('click', () => {
  clearTimeout(timer);
  document.querySelectorAll('.char').forEach(c => c.classList.remove('highlighted'));
  unitIndex = 0; playing = false;
  if (cues.length) showCue(0);
  updatePlayBtn(); updateNav(); updateProgress();
});

// ── PREV / NEXT ──
prevBtn.addEventListener('click', () => jumpToCue(Math.max(0, currentCue - 1)));
nextBtn.addEventListener('click', () => jumpToCue(Math.min(cues.length - 1, currentCue + 1)));

function jumpToCue(idx) {
  playing = false; clearTimeout(timer);
  document.querySelectorAll('.char').forEach(c => c.classList.remove('highlighted'));
  unitIndex = allUnits.findIndex(u => u.cueIdx === idx);
  if (unitIndex < 0) unitIndex = 0;
  showCue(idx); updatePlayBtn(); updateNav(); updateProgress();
}

// ── SCROLL on stage ──
let scrollAccum = 0;
// scroll only changes visible cue — never stops highlight
let scrollAccum = 0;
stage.addEventListener('wheel', e => {
  e.preventDefault(); scrollAccum += e.deltaY;
  if (Math.abs(scrollAccum) > 60) {
    // only change visible cue — do NOT call jumpToCue which stops playback
    const target = scrollAccum > 0
      ? Math.min(cues.length - 1, currentCue + 1)
      : Math.max(0, currentCue - 1);
    showCue(target);
    updateNav();
    scrollAccum = 0;
  }
}, { passive: false });

// ── SPACEBAR ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault(); togglePlay();
  }
});

// ── RECORD — canvas capture → MP4 if supported, else webm ──
recordBtn.addEventListener('click', async () => {
  if (isRecording) { stopRecording(); return; }

  const stageRect = stage.getBoundingClientRect();
  const aspect = stageRect.width / stageRect.height;
  const capH = 480;
  const capW = Math.round(capH * aspect);

  recCanvas.width  = capW;
  recCanvas.height = capH;
  const ctx = recCanvas.getContext('2d');

  let canvasStream;
  try { canvasStream = recCanvas.captureStream(25); }
  catch(e) { alert('Recording not supported. Use Chrome or Edge.'); return; }

  // prefer mp4, fallback to webm
  const mimeType = [
    'video/mp4;codecs=avc1',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm'
  ].find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';

  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 3000000 });
  } catch(e) {
    mediaRecorder = new MediaRecorder(canvasStream);
  }

  mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    clearInterval(recTimerInterval);
    isRecording = false;
    recordBtn.textContent = '⏺ Record';
    recordBtn.classList.remove('recording');
    recTimer.classList.remove('active');
    if (rafId) cancelAnimationFrame(rafId);

    const blob = new Blob(recordedChunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'green-screen-lyrics.' + ext;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
  };

  isRecording = true;
  mediaRecorder.start(200);

  // rAF capture loop — 25fps
  let lastCapture = 0;
  const fInterval = 1000 / 25;

  async function captureFrame(ts) {
    if (!isRecording) return;
    rafId = requestAnimationFrame(captureFrame);
    if (ts - lastCapture < fInterval) return;
    lastCapture = ts;
    try {
      const tmp = await html2canvas(stage, {
        backgroundColor: '#00FF00',
        scale: capW / stageRect.width,
        width: stageRect.width,
        height: stageRect.height,
        useCORS: true,
        logging: false
      });
      ctx.drawImage(tmp, 0, 0, capW, capH);
    } catch(e) { /* skip frame on error */ }
  }
  rafId = requestAnimationFrame(captureFrame);

  recStartTime = Date.now();
  recTimerInterval = setInterval(() => {
    const s = Math.floor((Date.now()-recStartTime)/1000);
    recTimer.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }, 1000);

  recordBtn.textContent = '⏹ Stop & Save';
  recordBtn.classList.add('recording');
  recTimer.classList.add('active');
  recTimer.textContent = '00:00';
});

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function updateNav() {
  cueInfo.textContent = cues.length ? 'Cue '+(currentCue+1)+' / '+cues.length : 'Load lyrics to begin';
}
function updateProgress() {
  progressBar.style.width = (allUnits.length ? unitIndex/allUnits.length*100 : 0) + '%';
}
</script>
</body>
</html>
